[project]
name = "openwebui-env"
version = "0.1.0"
requires-python = ">=3.12,<3.13"
dependencies = [
    "open-webui==0.8.8" 
]

[project.optional-dependencies]
cpu = [
  "torch==2.10.0"
]
cuda = [
  "torch==2.10.0",
  "nvidia-cublas-cu12" # ctranslate2 is used for voice transcription and requires Cuda 12
]

[tool.uv]
conflicts = [
  [
    { extra = "cpu" },
    { extra = "cuda" },
  ],
]

[tool.uv.sources]
torch = [
  { index = "pytorch-cpu", extra = "cpu" },
  { index = "pytorch-cu130", extra = "cuda" },
]

[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true

[[tool.uv.index]]
name = "pytorch-cu130"
url = "https://download.pytorch.org/whl/cu130"
explicit = true