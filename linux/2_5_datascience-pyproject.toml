[project]
name = "project"
version = "0.1.0"
description = "Add your project description here"
requires-python = ">=3.12,<3.13"
dependencies = [
    "ipywidgets==8.1.8",
    "pandas==3.0.2",
    "scikit-learn==1.8.0",
    "fastai==2.8.7",
    "nbdev==3.0.15",
    "ollama==0.6.2",
    "openai==2.33.0",
    "wordslab-notebooks-lib==0.0.17"
]

[project.optional-dependencies]
cpu = [
  "torch==2.11.0",
  "torchvision==0.26.0",
  "torchaudio==2.11.0"
]
cuda = [
  "torch==2.11.0",
  "torchvision==0.26.0",
  "torchaudio==2.11.0"
]

[dependency-groups]
dev = [
    "ipykernel==7.2.0",
]

[tool.uv]
conflicts = [
  [
    { extra = "cpu" },
    { extra = "cuda" },
  ],
]

[tool.uv.sources]
torch = [
  { index = "pytorch-cpu", extra = "cpu" },
  { index = "pytorch-cu130", extra = "cuda" },
]
torchvision = [
  { index = "pytorch-cpu", extra = "cpu" },
  { index = "pytorch-cu130", extra = "cuda" },
]
torchaudio = [
  { index = "pytorch-cpu", extra = "cpu" },
  { index = "pytorch-cu130", extra = "cuda" },
]

[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true

[[tool.uv.index]]
name = "pytorch-cu130"
url = "https://download.pytorch.org/whl/cu130"
explicit = true
